.mesas-grid{

.mesa-btn{

height:120px;
font-size:28px;

.libre{

.pendiente{

button{
border:none;
border-radius:10px;

margin:6px;

}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#2e7d32;
color:white;
padding:14px 22px;
border-radius:10px;
font-size:18px;
display:none;
z-index:1000;
}

</style>

</head>

<body>

<script>

const { createClient } = supabase

const supabaseKey = "sb_publishable_hfoKEQ7CjCtL63kwvXd1MQ_k_WpgGry"

const db = createClient(supabaseUrl, supabaseKey)

let mesaActual=null

const opcionesProductos={

"Mini salgadinhos (12 unid.)":[

function mostrarToast(texto){

const toast=document.getElementById("toast")

toast.innerText=texto
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},1500)

}

  async function cargarMesas(){

const { data:mesas } = await db
.from("mesas")
.select("*")

let barra=""
let esplanada=""
let salon=""

for(const m of mesas){

const { data:pedidos } = await db
.from("pedidos")
.select("*")
.eq("mesa",m.id)

let estado="libre"
let cantidad=0

const abiertos = pedidos.filter(p => p.estado !== "cerrado")

if(abiertos.length > 0){

cantidad = abiertos.length

const pendientes = abiertos.filter(p => p.estado === "pendiente")

if(pendientes.length > 0){
estado="pendiente"
}else{
estado="listo"
}

}

const boton=`
<button class="mesa-btn ${estado}" onclick="abrirMesa('${m.id}')">
<div>${m.id}</div>
<div class="items">${cantidad} items</div>
</button>
`

if(m.id.startsWith("B")){
barra+=boton
}
else if(m.id.startsWith("E")){
esplanada+=boton
}
else{
salon+=boton
}

}

let html=`

<div class="zona">
<h2>BARRA</h2>
<div class="mesas-grid">
${barra}
</div>
</div>

<div class="zona">
<h2>ESPLANADA</h2>
<div class="mesas-grid">
${esplanada}
</div>
</div>

<div class="zona">
<h2>SALÓN</h2>
<div class="mesas-grid">
${salon}
</div>
</div>

`

document.getElementById("mesas").innerHTML=html

}

mesaActual=mesa

const menu={

let html=`<h2>Mesa ${mesa}</h2>`

html+=`<button onclick="verPedido('${mesa}')">Ver pedido</button><br><br>`

html+=`
<input
type="text"
placeholder="Buscar producto..."
onkeyup="buscarProducto(this.value)"
style="width:300px;padding:10px;margin-bottom:20px">
`

for(const categoria in menu){

html+=`<h3>${categoria.toUpperCase()}</h3>`

menu[categoria].forEach(item=>{

html+=`
<button onclick="seleccionarProducto('${item[0]}',${item[1]})"
style="width:180px;height:70px">
${item[0]}<br>€${item[1]}
</button>
`

})

document.getElementById("mesas").innerHTML=html

}



function seleccionarProducto(producto,precio){

if(!opcionesProductos[producto]){
pedir(producto,precio)
return
}

let html=`<h2>${producto}</h2>`

opcionesProductos[producto].forEach(op=>{

html+=`
<button onclick="pedir('${producto} (${op})',${precio})"
style="width:220px;height:60px">
${op}
</button>
`

})

html+=`<br><br><button onclick="abrirMesa('${mesaActual}')">Volver</button>`

document.getElementById("mesas").innerHTML=html

}



async function pedir(producto,precio){

await db.from("pedidos").insert({
mesa:mesaActual,
producto:producto,
precio:precio,
cantidad:1,
estado:"pendiente"
})

mostrarToast(producto+" enviado a cozinha")

abrirMesa(mesaActual)

}



function buscarProducto(texto){

texto=texto.toLowerCase()

document.querySelectorAll("#mesas button").forEach(b=>{

if(b.innerText.toLowerCase().includes(texto)){
b.style.display="inline-block"
}else{
b.style.display="none"
}

})

}



async function verPedido(mesa){

const { data } = await db
.from("pedidos")
.select("*")
.eq("mesa",mesa)

let html=`<h2>Mesa ${mesa}</h2>`

let total=0

data.forEach(p=>{

let color="black"

if(p.estado=="pendiente") color="orange"
if(p.estado=="listo") color="green"
if(p.estado=="cerrado") color="gray"

if(p.estado!="cerrado"){
total+=p.precio
}

html+=`
<div style="border-bottom:1px solid #ccc;padding:10px;color:${color}">
${p.producto} - €${p.precio}

<button onclick="borrarPedido(${p.id},'${mesa}')" style="margin-left:10px;background:red;color:white">
❌
</button>

</div>
`

})

html+=`<h3>Total: €${total.toFixed(2)}</h3>`

html+=`
<br>
<button onclick="abrirMesa('${mesa}')">Agregar más</button>
<button onclick="cerrarMesa('${mesa}')">Cerrar mesa</button>
<button onclick="borrarMesa('${mesa}')">Borrar mesa</button>
<button onclick="cargarMesas()">Volver</button>
`

document.getElementById("mesas").innerHTML=html

}



async function borrarPedido(id,mesa){

await db
.from("pedidos")
.delete()
.eq("id",id)

verPedido(mesa)

}



async function cerrarMesa(mesa){

await db
.from("pedidos")
.update({estado:"cerrado"})
.eq("mesa",mesa)
.eq("estado","pendiente")

mostrarToast("Mesa cerrada")

cargarMesas()

}



async function borrarMesa(mesa){

await db
.from("pedidos")
.delete()
.eq("mesa",mesa)

mostrarToast("Mesa borrada")

cargarMesas()

}



cargarMesas()

</script>
